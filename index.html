<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>R1GBA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:240px;height:282px;overflow:hidden;
  background:#0e0e10;
  font-family:-apple-system,sans-serif;
  -webkit-user-select:none;user-select:none;
  position:relative;
}
#menu-screen{
  position:absolute;top:0;left:0;width:240px;height:282px;
  display:flex;flex-direction:column;background:#0e0e10;z-index:100;
}
#menu-header{
  padding:8px 10px 6px;
  border-bottom:1px solid rgba(254,80,0,0.18);
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:#FE5000;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
#menu-header img{width:20px;height:20px;object-fit:contain;flex-shrink:0}
#menu-list-wrap{flex:1;overflow:hidden;position:relative}
#menu-list{position:absolute;top:0;left:0;right:0;transition:transform .15s ease}
.menu-item{
  padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.55);
  border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.menu-item img{
  width:20px;height:20px;object-fit:cover;border-radius:2px;
  flex-shrink:0;background:rgba(255,255,255,0.05);
}
.menu-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-item.selected{
  color:#fff;background:rgba(254,80,0,0.12);
  border-left:2px solid #FE5000;
}
#menu-footer{
  padding:4px 8px;font-size:7px;color:rgba(255,255,255,0.2);
  text-align:center;letter-spacing:0.5px;flex-shrink:0;
}
#loading{
  position:absolute;top:0;left:0;width:240px;height:282px;
  display:none;align-items:center;justify-content:center;
  background:#0e0e10;z-index:200;flex-direction:column;gap:10px;
}
#loading-text{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1px}
</style>
</head>
<body>

<div id="loading"><div id="loading-text">R1GBA</div></div>

<div id="menu-screen">
  <div id="menu-header"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/VisualBoyAdvance.png" onerror="this.style.display='none'">R1 GAMEBOY ADVANCE</div>
  <div id="menu-list-wrap"><div id="menu-list"></div></div>
  <div id="menu-footer">SCROLL choose · SIDE CLICK select · <svg width="7" height="7" viewBox="0 0 16 16" style="vertical-align:middle;fill:currentColor"><path d="M13 8a5 5 0 0 1-8.5 3.5L3 10v4h4l-1.2-1.2A6 6 0 1 0 7 2v2a4 4 0 0 1 6 4z"/></svg> ROTATE to play</div>
</div>

<script>
var THUMB_BASE = 'https://thumbnails.libretro.com/Nintendo%20-%20Game%20Boy%20Advance/Named_Boxarts/';
var GAMES = [
  {id:'pokemonruby',      name:'Pokemon Ruby',                        thumb:'Pokemon - Ruby Version (USA).png'},
  {id:'pokemonsapphire',  name:'Pokemon Sapphire',                   thumb:'Pokemon - Sapphire Version (USA).png'},
  {id:'pokemonemerald',   name:'Pokemon Emerald',                    thumb:'Pokemon - Emerald Version (USA, Europe).png'},
  {id:'pokemonred',       name:'Pokemon FireRed',                    thumb:'Pokemon - FireRed Version (USA).png'},
  {id:'pokemongreen',     name:'Pokemon LeafGreen',                  thumb:'Pokemon - LeafGreen Version (USA).png'},
  {id:'mysteryred',       name:'Pokemon Mystery Dungeon',            thumb:'Pokemon Mystery Dungeon - Red Rescue Team (USA, Australia).png'},
  {id:'zelda_minish',     name:'Zelda: Minish Cap',                  thumb:'Legend of Zelda, The - The Minish Cap (USA).png'},
  {id:'zelda_past',       name:'Zelda: Link to the Past',            thumb:'Legend of Zelda, The - A Link to the Past _ Four Swords (USA).png'},
  {id:'mariokart',        name:'Mario Kart Super Circuit',           thumb:'Mario Kart - Super Circuit (USA).png'},
  {id:'supermarioadvance', name:'Super Mario Advance',               thumb:'Super Mario Advance (USA, Europe).png'},
  {id:'supermarioadvance2',name:'Super Mario Advance 2',             thumb:'Super Mario Advance 2 - Super Mario World (USA, Australia).png'},
  {id:'supermarioadvance3',name:'Super Mario Advance 3',             thumb:'Super Mario Advance 3 - Yoshi\'s Island (USA).png'},
  {id:'metroid_fusion',   name:'Metroid Fusion',                     thumb:'Metroid Fusion (USA).png'},
  {id:'metroid_zeromission',name:'Metroid Zero Mission',             thumb:'Metroid - Zero Mission (USA).png'},
  {id:'goldensun',        name:'Golden Sun',                          thumb:'Golden Sun (USA, Europe).png'},
  {id:'ff1and2',          name:'Final Fantasy I & II',                thumb:'Final Fantasy I _ II - Dawn of Souls (USA).png'},
  {id:'ff6',              name:'Final Fantasy VI Advance',            thumb:'Final Fantasy VI Advance (USA).png'},
  {id:'final_fantasy_tactics',name:'Final Fantasy Tactics',           thumb:'Final Fantasy Tactics Advance (USA).png'},
  {id:'fire_emblem',      name:'Fire Emblem',                         thumb:'Fire Emblem (USA, Australia).png'},
  {id:'warioland4',       name:'Wario Land 4',                        thumb:'Wario Land 4 (USA, Europe).png'},
  {id:'sonic_advance',    name:'Sonic Advance',                       thumb:'Sonic Advance (USA) (En,Ja).png'},
  {id:'advancewars',      name:'Advance Wars',                        thumb:'Advance Wars (USA).png'},
  {id:'advancewars2',     name:'Advance Wars 2',                      thumb:'Advance Wars 2 - Black Hole Rising (USA).png'},
  {id:'drilldozer',       name:'Drill Dozer',                         thumb:'Drill Dozer (USA).png'},
  {id:'fzero_gp',         name:'F-Zero GP Legend',                    thumb:'F-Zero - GP Legend (USA).png'},
  {id:'kirbynightmare',   name:'Kirby Nightmare',                     thumb:'Kirby - Nightmare in Dream Land (USA).png'},
  {id:'kirbymirror',      name:'Kirby Amazing Mirror',                thumb:'Kirby _ The Amazing Mirror (USA).png'},
  {id:'megaman_zero1',    name:'Megaman Zero',                        thumb:'Megaman Zero (USA, Europe).png'},
  {id:'metalslug',        name:'Metal Slug Advance',                  thumb:'Metal Slug Advance (USA).png'},
  {id:'tetris_worlds',    name:'Tetris Worlds',                       thumb:'Tetris Worlds (USA).png'},
  {id:'marioparty',      name:'Mario Party Advance',                  thumb:'Mario Party Advance (USA).png'},
  {id:'fzero_max',        name:'F-Zero Max Velocity',                 thumb:'F-Zero - Maximum Velocity (USA, Europe).png'}
];

var ROM_BASE = 'https://gba.js.org/binaries/';
var $loading = document.getElementById('loading');
var $menu = document.getElementById('menu-screen');
var $menuList = document.getElementById('menu-list');
var menuIndex = 0;

function buildMenu() {
  var html = '';
  for (var i=0;i<GAMES.length;i++) {
    var g = GAMES[i];
    var src = g.thumb ? THUMB_BASE + encodeURI(g.thumb) : '';
    html += '<div class="menu-item" data-idx="'+i+'">';
    if (src) html += '<img src="'+src+'" onerror="this.style.display=\'none\'">';
    html += '<span>'+g.name+'</span></div>';
  }
  $menuList.innerHTML = html;
  var items = $menuList.querySelectorAll('.menu-item');
  for (var j=0;j<items.length;j++) {
    items[j].addEventListener('pointerdown', function(){
      menuIndex = parseInt(this.getAttribute('data-idx'));
      renderMenu();
    });
    items[j].addEventListener('pointerup', function(){
      var idx = parseInt(this.getAttribute('data-idx'));
      if (menuIndex === idx) selectGame(idx);
    });
  }
  renderMenu();
  $loading.style.display = 'none';
}

function renderMenu() {
  var items = $menuList.querySelectorAll('.menu-item');
  for (var i=0;i<items.length;i++){
    items[i].classList.toggle('selected', i===menuIndex);
  }
  if (items.length === 0) return;
  var wrap = document.getElementById('menu-list-wrap');
  var viewH = wrap.clientHeight;
  var lastItem = items[items.length-1];
  var totalH = lastItem.offsetTop + lastItem.offsetHeight;
  var maxScroll = Math.max(0, totalH - viewH);
  var target = Math.max(0, Math.min(maxScroll, items[menuIndex].offsetTop));
  $menuList.style.transform = 'translateY(-'+target+'px)';
}

function selectGame(idx) {
  if (idx < 0 || idx >= GAMES.length) return;
  var g = GAMES[idx];
  var romUrl = g.url || (ROM_BASE + g.id + '.gba');
  window.location.href = 'play.html?rom=' + encodeURIComponent(romUrl) + '&v=7';
}

function menuUp()   { if (menuIndex > 0) { menuIndex--; renderMenu(); } }
function menuDown() { if (menuIndex < GAMES.length-1) { menuIndex++; renderMenu(); } }

function setupR1Controls() {
  window.addEventListener('sideClick', function(){ selectGame(menuIndex); });
window.addEventListener('scrollUp',   menuDown);
window.addEventListener('scrollDown', menuUp);
  window.addEventListener('longPressStart', function(){ selectGame(menuIndex); });
}

function setupKeyboard() {
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowUp')    menuUp();
    if (e.key === 'ArrowDown')  menuDown();
    if (e.key === 'Enter')      selectGame(menuIndex);
  });
}

// Boot
(function init(){
  buildMenu();
  setupR1Controls();
  setupKeyboard();
})();
</script>
</body>
</html>
