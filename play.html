<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="Cache-Control" content="no-cache" />
        <meta
            name="viewport"
            content="width=240,initial-scale=1.0,user-scalable=no"
        />
        <meta
            http-equiv="Cache-Control"
            content="no-cache,no-store,must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>R1GBA</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 240px;
                height: 282px;
                overflow: hidden;
                background: #000;
                -webkit-user-select: none;
                user-select: none;
            }
            #game {
                position: absolute;
                width: 282px !important;
                height: 240px !important;
                left: -21px;
                top: 21px;
                transform: rotate(-90deg);
                transform-origin: center center;
                background: #000;
                overflow: hidden;
                will-change: transform;
            }
            #game canvas,
            .ejs_canvas {
                width: 100% !important;
                height: 100% !important;
                image-rendering: pixelated;
                will-change: transform;
            }
            .ejs_parent canvas {
                width: 100% !important;
                height: 100% !important;
            }
            #menu-trigger {
                position: fixed;
                left: 0;
                top: 0;
                width: 60px;
                height: 60px;
                z-index: 9999;
                touch-action: auto;
                pointer-events: auto;
                background: transparent;
            }
            [class*="virtual"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="gamepad"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="Gamepad"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="nipple"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="ejs_bottom"] {
                display: none !important;
            }
            .ejs_menu_bar, .ejs_settings_parent, .ejs_settings_btn {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            #gp {
                position: fixed;
                inset: 0;
                z-index: 2147483647;
                pointer-events: none;
                will-change: transform;
                isolation: isolate;
            }
            .gp-btn {
                position: absolute;
                display: flex;
                align-items: center;
                justify-content: center;
                color: rgba(255, 255, 255, 0.5);
                font-size: 11px;
                font-weight: 700;
                pointer-events: auto;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                -webkit-user-drag: none;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                transform: rotate(-90deg);
                background: transparent;
                transition: none;
                user-select: none;
                -webkit-user-select: none;
            }
            .gp-btn:active {
                opacity: 0.6;
                background: none;
            }
            #gp-up {
                top: 230px;
                right: 54px;
                width: 36px;
                height: 36px;
                line-height: 1;
                padding: 0;
            }
            #gp-down {
                top: 246px;
                right: 14px;
                width: 36px;
                height: 36px;
            }
            #gp-left {
                display: none !important;
            }
            #gp-right {
                display: none !important;
            }
            #gp-a {
                top: 18px;
                right: 54px;
                width: 36px;
                height: 36px;
            }
            #gp-b {
                top: 6px;
                right: 14px;
                width: 36px;
                height: 36px;
            }
            #gp-r {
                top: 6px;
                right: 202px;
                width: 28px;
                height: 28px;
                background: rgba(0,0,0,0.4);
                border: 1px solid rgba(255,255,255,0.25);
            }
            #gp-l {
                top: 246px;
                right: 202px;
                width: 28px;
                height: 28px;
                background: rgba(0,0,0,0.4);
                border: 1px solid rgba(255,255,255,0.25);
            }

        </style>
    </head>
    <body>
        <div id="game"></div>
        <div id="menu-trigger"></div>
        <div id="gp">
            <div id="gp-up" class="gp-btn" data-btn="4" data-kc="38">▲</div>
            <div id="gp-down" class="gp-btn" data-btn="5" data-kc="40">▼</div>
            <div id="gp-left" class="gp-btn" data-btn="6" data-kc="37">◀</div>
            <div id="gp-right" class="gp-btn" data-btn="7" data-kc="39">▶</div>
            <div id="gp-a" class="gp-btn" data-btn="8" data-kc="90">A</div>
            <div id="gp-b" class="gp-btn" data-btn="0" data-kc="88">B</div>
            <div id="gp-l" class="gp-btn" data-btn="10" data-kc="81">L</div>
            <div id="gp-r" class="gp-btn" data-btn="11" data-kc="87">R</div>
        </div>

        <script>
            // Hard-disable web vibrate calls (from any source, including hidden controls).
            try {
                if (navigator && typeof navigator.vibrate === 'function') {
                    navigator.vibrate = function () { return false; };
                }
            } catch (e) {}

            var romUrl = "";
            var m = location.search.match(/[?&]rom=([^&]+)/);
            if (m) {
                romUrl = decodeURIComponent(m[1]);
                if (
                    !romUrl.match(/^https?:\/\//) &&
                    romUrl.match(/^[a-zA-Z0-9_-]+$/)
                ) {
                    romUrl =
                        "https://drive.usercontent.google.com/download?id=" +
                        romUrl +
                        "&export=download";
                }
            }

            EJS_player = "#game";
            EJS_core = "gba";
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            EJS_gameUrl = romUrl;
            EJS_gameName = romUrl.replace(/^.*[\/\\]/,'').replace(/\.gba$/i,'');
            EJS_startOnLoaded = true;
            EJS_hideSettings = true;
            EJS_volume = 0.5;
            EJS_backgroundColor = "#000";
            EJS_VirtualGamepadSettings = [];
            EJS_Buttons = {
                playPause: false,
                restart: false,
                mute: false,
                settings: false,
                fullscreen: false,
                saveState: false,
                loadState: false,
                screenRecord: false,
                gamepad: false,
                cheat: false,
                volume: false,
                saveSavFiles: false,
                loadSavFiles: false,
                quickSave: false,
                quickLoad: false,
                screenshot: false,
                cacheManager: false,
                exitEmulation: false,
            };
            EJS_defaultOptions = {
                mgba_frameskip: 2,
                mgba_frameskip_threshold: "33",
                'vsync': 'disabled',
            };
            EJS_retroarchOpts = [
                { name: "audio_latency",      default: "256",  isString: false },
                { name: "audio_rate_control", default: "true", isString: false },
                { name: "audio_rate_control_delta", default: "0.0015", isString: false },
                { name: "audio_resampler",    default: "sinc", isString: true  },
                { name: "video_threaded",     default: "true"                   },
                { name: "video_vsync",        default: "false", isString: false },
            ];

            var gm = null,
                started = false,
                prebootRestoreDone = false,
                runtimeRestoreTried = false,
                autoSaveIntervalId = null,
                saveQueue = Promise.resolve();

            function normalizeName(v) {
                return (v || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            }

            function canonicalSavePath() {
                return '/data/saves/' + EJS_gameName + '.srm';
            }

            function legacyDataKey() {
                return '_r1s_' + EJS_gameName;
            }

            function legacyPathKey() {
                return '_r1s_' + EJS_gameName + '_path';
            }

            function slotDataKey(slot) {
                return '_r1s_' + EJS_gameName + '_slot_' + slot;
            }

            function slotMetaKey(slot) {
                return '_r1s_' + EJS_gameName + '_slot_' + slot + '_meta';
            }

            function headKey() {
                return '_r1s_' + EJS_gameName + '_head';
            }

            function pathMatchesCurrentGame(path) {
                var file = String(path || '').split('/').pop() || '';
                var game = normalizeName(EJS_gameName);
                return !!game && normalizeName(file).indexOf(game) !== -1;
            }

            function sanitizeSavePath(path) {
                if (typeof path !== 'string') return canonicalSavePath();
                if (path.indexOf('/data/saves/') !== 0) return canonicalSavePath();
                if (!pathMatchesCurrentGame(path)) return canonicalSavePath();
                return path;
            }

            function checksumHex(bytes) {
                var h = 2166136261 >>> 0;
                for (var i = 0; i < bytes.length; i++) {
                    h ^= bytes[i];
                    h = Math.imul(h, 16777619) >>> 0;
                }
                return ('00000000' + h.toString(16)).slice(-8);
            }

            function blankLikeRatio(bytes) {
                if (!bytes || !bytes.length) return 1;
                var maxSamples = 4096;
                var step = Math.max(1, Math.floor(bytes.length / maxSamples));
                var first = bytes[0];
                var zeros = 0;
                var ffs = 0;
                var firstMatches = 0;
                var samples = 0;
                for (var i = 0; i < bytes.length; i += step) {
                    var b = bytes[i];
                    samples++;
                    if (b === 0) zeros++;
                    if (b === 255) ffs++;
                    if (b === first) firstMatches++;
                }
                var dominant = Math.max(zeros, ffs, firstMatches);
                return dominant / Math.max(1, samples);
            }

            function isLikelyBlankSave(bytes) {
                return blankLikeRatio(bytes) >= 0.93;
            }

            function shouldPreferOlderNonBlank(newer, older) {
                if (!newer || !older || !newer.bytes || !older.bytes) return false;
                var newerBlank = isLikelyBlankSave(newer.bytes);
                var olderBlank = isLikelyBlankSave(older.bytes);
                if (!newerBlank || olderBlank) return false;
                var newerRev = newer.revision || 0;
                var olderRev = older.revision || 0;
                return Math.abs(newerRev - olderRev) <= 6;
            }

            function decodeStoredBytes(raw) {
                if (!raw) return null;
                try {
                    var bin = atob(raw);
                    var arr = new Uint8Array(bin.length);
                    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                    return arr;
                } catch (e) {}
                try {
                    var plain = JSON.parse(raw);
                    if (!plain || typeof plain.length !== 'number') return null;
                    var arr2 = new Uint8Array(plain.length);
                    for (var j = 0; j < plain.length; j++) arr2[j] = plain[j];
                    return arr2;
                } catch (e2) {}
                return null;
            }

            function encodeBytesToBase64(bytes) {
                var CHUNK = 0x8000;
                var out = '';
                for (var i = 0; i < bytes.length; i += CHUNK) {
                    var sub = bytes.subarray(i, i + CHUNK);
                    out += String.fromCharCode.apply(null, sub);
                }
                return btoa(out);
            }

            function readSlotEntry(slot) {
                try {
                    var raw = localStorage.getItem(slotDataKey(slot));
                    var metaRaw = localStorage.getItem(slotMetaKey(slot));
                    if (!raw || !metaRaw) return null;
                    var meta = JSON.parse(metaRaw);
                    var bytes = decodeStoredBytes(raw);
                    if (!bytes || !bytes.length) return null;
                    if (meta && meta.byteLength && bytes.length !== meta.byteLength) return null;
                    var check = checksumHex(bytes);
                    if (meta && meta.checksum && meta.checksum !== check) return null;
                    return {
                        bytes: bytes,
                        path: sanitizeSavePath(meta && meta.path),
                        revision: (meta && meta.revision) || 0,
                        timestamp: (meta && meta.timestamp) || 0,
                    };
                } catch (e) {
                    return null;
                }
            }

            function chooseNewer(a, b) {
                if (!a) return b || null;
                if (!b) return a;
                if ((a.revision || 0) !== (b.revision || 0)) {
                    var newerByRev = (a.revision || 0) > (b.revision || 0) ? a : b;
                    var olderByRev = newerByRev === a ? b : a;
                    if (shouldPreferOlderNonBlank(newerByRev, olderByRev)) return olderByRev;
                    return newerByRev;
                }
                var newerByTime = (a.timestamp || 0) >= (b.timestamp || 0) ? a : b;
                var olderByTime = newerByTime === a ? b : a;
                if (shouldPreferOlderNonBlank(newerByTime, olderByTime)) return olderByTime;
                return newerByTime;
            }

            function readLegacyEntry() {
                var bytes = decodeStoredBytes(localStorage.getItem(legacyDataKey()));
                if (!bytes || !bytes.length) return null;
                return {
                    bytes: bytes,
                    path: sanitizeSavePath(localStorage.getItem(legacyPathKey()) || canonicalSavePath()),
                    revision: 0,
                    timestamp: 0,
                };
            }

            function readBestStoredSave() {
                try {
                    var headRaw = localStorage.getItem(headKey());
                    if (headRaw) {
                        var head = JSON.parse(headRaw);
                        var active = head && head.activeSlot === 'b' ? 'b' : 'a';
                        var primary = readSlotEntry(active);
                        var secondary = readSlotEntry(active === 'a' ? 'b' : 'a');
                        var chosen = chooseNewer(primary, secondary);
                        if (chosen) return chosen;
                    }
                } catch (e) {}
                var a = readSlotEntry('a');
                var b = readSlotEntry('b');
                var best = chooseNewer(a, b);
                if (best) return best;
                return readLegacyEntry();
            }

            function restoreFromLocalStorage(fsOverride) {
                try {
                    var entry = readBestStoredSave();
                    if (!entry || !entry.bytes || !entry.bytes.length) return false;
                    var bytes = entry.bytes;

                    var fs = fsOverride || (gm && gm.FS);
                    if (!fs) return false;

                    // Method 1: write directly into WASM SRAM memory — bypasses all FS/IndexedDB races
                    var sramDone = false;
                    if (!fsOverride && gm) {
                        try {
                            var M = gm.Module || (window.EJS_emulator && window.EJS_emulator.Module);
                            if (M && M.HEAPU8 && M._retro_get_memory_data && M._retro_get_memory_size) {
                                var ptr  = M._retro_get_memory_data(2); // RETRO_MEMORY_SAVE_RAM
                                var size = M._retro_get_memory_size(2);
                                if (ptr > 0 && size > 0) {
                                    var len = Math.min(bytes.length, size);
                                    for (var k = 0; k < len; k++) M.HEAPU8[ptr + k] = bytes[k];
                                    sramDone = true;
                                }
                            }
                        } catch(e) {}
                    }

                    // Method 2: write to FS — always do this so saveSaveFiles() flushes correct data
                    var savePath = sanitizeSavePath(entry.path || canonicalSavePath());
                    try { fs.mkdir('/data'); } catch(e) {}
                    try { fs.mkdir('/data/saves'); } catch(e) {}
                    try { fs.writeFile(savePath, bytes); } catch(e) {}

                    if (fsOverride) return true;
                    return true;
                } catch(e) { return false; }
            }

            function layoutGameContainer() {
                var game = document.getElementById('game');
                if (!game) return;
                var vw = window.innerWidth || 240;
                var vh = window.innerHeight || 282;
                var w = vh;
                var h = vw;
                game.style.setProperty('width', w + 'px', 'important');
                game.style.setProperty('height', h + 'px', 'important');
                game.style.left = ((vw - w) / 2) + 'px';
                game.style.top = ((vh - h) / 2) + 'px';
            }

            function applyGameCanvasFit() {
                var cvs = document.querySelector('#game canvas');
                if (!cvs) return false;
                cvs.style.width = '100%';
                cvs.style.height = '100%';
                cvs.style.minWidth = '100%';
                cvs.style.minHeight = '100%';
                // "fill" = full screen with no crop; this may stretch slightly.
                cvs.style.objectFit = 'fill';
                var p = cvs.parentElement;
                while (p && p.id !== 'game') {
                    p.style.width = '100%';
                    p.style.height = '100%';
                    p.style.minWidth = '100%';
                    p.style.minHeight = '100%';
                    p.style.margin = '0';
                    p.style.padding = '0';
                    p.style.border = 'none';
                    p.style.overflow = 'hidden';
                    p = p.parentElement;
                }
                return true;
            }

            layoutGameContainer();
            window.addEventListener('resize', function () {
                layoutGameContainer();
                applyGameCanvasFit();
            });

            EJS_ready = function () {
                var readyAttempts = 0;
                var tryReady = setInterval(function () {
                    readyAttempts++;
                    if (window.EJS_emulator) {
                        clearInterval(tryReady);
                        try { window.EJS_emulator.startSaveInterval(10000); } catch(e) {}
                        try {
                            window.EJS_emulator.on('saveDatabaseLoaded', function (FS) {
                                // Pre-boot restore so games detect save on first open.
                                if (!prebootRestoreDone) {
                                    prebootRestoreDone = restoreFromLocalStorage(FS) || prebootRestoreDone;
                                }
                            });
                        } catch (e) {}
                    } else if (readyAttempts > 180) {
                        clearInterval(tryReady);
                    }
                }, 200);
            };

            EJS_onGameStart = function () {
                var getAttempts = 0;
                var tryGet = setInterval(function () {
                    getAttempts++;
                    if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                        clearInterval(tryGet);
                        gm = window.EJS_emulator.gameManager;
                        started = true;
                        // Always run a runtime restore pass; pre-boot FS restore can still miss ROM boot timing.
                        if (!runtimeRestoreTried) {
                            runtimeRestoreTried = true;
                            setTimeout(function () {
                                restoreFromLocalStorage();
                            }, 150);
                            setTimeout(function () {
                                restoreFromLocalStorage();
                            }, 900);
                        }
                        if (autoSaveIntervalId) clearInterval(autoSaveIntervalId);
                        autoSaveIntervalId = setInterval(function () {
                            saveToLocalStorage(null, 'autosave-interval');
                        }, 30000);
                    } else if (getAttempts > 300) {
                        clearInterval(tryGet);
                    }
                }, 300);

                // Fit reliably even when emulator canvas appears late or gets recreated.
                var fitAttempts = 0;
                var fitTicker = setInterval(function () {
                    fitAttempts++;
                    layoutGameContainer();
                    if (applyGameCanvasFit() || fitAttempts > 120) {
                        clearInterval(fitTicker);
                    }
                }, 125);

                var gameEl = document.getElementById('game');
                if (gameEl) {
                    var fitObserver = new MutationObserver(function () {
                        layoutGameContainer();
                        applyGameCanvasFit();
                    });
                    fitObserver.observe(gameEl, { childList: true, subtree: true });
                    setTimeout(function () {
                        try { fitObserver.disconnect(); } catch (e) {}
                    }, 15000);
                }
            };

            function doInput(btn, keyCode, val) {
                if (gm) {
                    try {
                        gm.simulateInput(0, btn, val);
                        return;
                    } catch (e) {}
                }
                var el = document.querySelector("#game");
                if (!el) return;
                var keyName =
                    {
                        90: "z",
                        88: "x",
                        87: "w",
                        81: "q",
                        13: "Enter",
                        16: "Shift",
                        37: "ArrowLeft",
                        38: "ArrowUp",
                        39: "ArrowRight",
                        40: "ArrowDown",
                    }[keyCode] || "unknown";
                var evtType = val === 1 ? "keydown" : "keyup";
                el.dispatchEvent(
                    new KeyboardEvent(evtType, {
                        key: keyName,
                        code: keyCode === 16 ? "ShiftLeft" : keyName,
                        keyCode: keyCode,
                        which: keyCode,
                        bubbles: true,
                        cancelable: true,
                    }),
                );
            }

            function press(btn, kc) {
                doInput(btn, kc, 1);
            }
            function release(btn, kc) {
                doInput(btn, kc, 0);
            }
            function tap(btn, kc, ms) {
                press(btn, kc);
                setTimeout(function () {
                    release(btn, kc);
                }, ms || 80);
            }

            document.querySelectorAll(".gp-btn").forEach(function (el) {
                var btn = parseInt(el.dataset.btn);
                var kc = parseInt(el.dataset.kc);
                el.addEventListener("pointerdown", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    press(btn, kc);
                });
                el.addEventListener("pointerup", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    release(btn, kc);
                });
                el.addEventListener("pointerleave", function () {
                    release(btn, kc);
                });
                el.addEventListener("pointercancel", function () {
                    release(btn, kc);
                });
                el.addEventListener("click", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("touchstart", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }, { passive: false });
                el.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }, { passive: false });
                el.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("mouseup", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("contextmenu", function (e) {
                    e.preventDefault();
                });
            });

            var sideCount = 0,
                lastSide = 0,
                sideTimer = null,
                longHeld = false;
            var SUPER_LONG_MS = 4000,
                superLongTimer = null,
                lastCloseCheckpointAt = 0;

            window.addEventListener("sideClick", function () {
                if (longHeld) return;
                var now = Date.now();
                clearTimeout(sideTimer);
                if (now - lastSide < 250) {
                    release(8, 90);
                    tap(0, 88, 80);
                    sideCount = 0;
                } else {
                    press(8, 90);
                    sideCount = 1;
                    sideTimer = setTimeout(function () {
                        if (sideCount === 1) {
                            release(8, 90);
                            sideCount = 0;
                        }
                    }, 200);
                }
                lastSide = now;
            });

            window.addEventListener("longPressStart", function () {
                longHeld = true;
                press(3, 13);
                superLongTimer = setTimeout(function () {
                    if (longHeld) {
                        release(3, 13);
                        saveToLocalStorage(function () {
                            window.location.href = "index.html";
                        }, 'manual-exit');
                    }
                }, SUPER_LONG_MS);
            });
            window.addEventListener("longPressEnd", function () {
                longHeld = false;
                clearTimeout(superLongTimer);
                release(3, 13);
            });

            function readSramSnapshot() {
                if (!gm) return null;
                try {
                    var M = gm.Module || (window.EJS_emulator && window.EJS_emulator.Module);
                    if (!M || !M.HEAPU8 || !M._retro_get_memory_data || !M._retro_get_memory_size) return null;
                    var ptr = M._retro_get_memory_data(2); // RETRO_MEMORY_SAVE_RAM
                    var size = M._retro_get_memory_size(2);
                    if (!(ptr > 0 && size >= 64)) return null;

                    var view = M.HEAPU8.subarray(ptr, ptr + size);
                    var bytes = new Uint8Array(view);

                    // Guard against uninitialized buffers that could overwrite valid saves.
                    var first = bytes[0];
                    var varied = false;
                    for (var i = 1; i < bytes.length; i++) {
                        if (bytes[i] !== first) {
                            varied = true;
                            break;
                        }
                    }
                    if (!varied) return null;
                    return bytes;
                } catch (e) {
                    return null;
                }
            }

            function checkpointOnClose() {
                var now = Date.now();
                if (now - lastCloseCheckpointAt < 1000) return;
                lastCloseCheckpointAt = now;

                var ok = false;
                var snap = readSramSnapshot();
                if (snap && snap.length >= 64) {
                    ok = storeSaveBytes(canonicalSavePath(), snap, { source: 'close-checkpoint' });
                }

                // If SRAM snapshot is unavailable, fall back to queued FS-based save.
                if (!ok) {
                    saveToLocalStorage(null, 'close-fs-sync');
                }
            }

            window.addEventListener('pagehide', checkpointOnClose, true);
            window.addEventListener('beforeunload', checkpointOnClose, true);
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden') {
                    checkpointOnClose();
                }
            });
            window.addEventListener('freeze', checkpointOnClose, true);

            function storeSaveBytes(fullPath, data, options) {
                if (!data || !data.length) return false;
                try {
                    var arr = new Uint8Array(data);
                    if (arr.length < 64) return false;
                    var source = (options && options.source) || 'unknown';

                    // Protect last-known-good save from blank-like close snapshots.
                    if (source === 'close-checkpoint' && isLikelyBlankSave(arr)) {
                        var current = readBestStoredSave();
                        if (current && current.bytes && !isLikelyBlankSave(current.bytes)) {
                            return false;
                        }
                    }

                    var path = sanitizeSavePath(fullPath || canonicalSavePath());
                    var payload = encodeBytesToBase64(arr);
                    var check = checksumHex(arr);

                    var head = null;
                    try { head = JSON.parse(localStorage.getItem(headKey()) || 'null'); } catch (e) {}
                    var nextSlot = (head && head.activeSlot === 'a') ? 'b' : 'a';
                    var nextRevision = (head && typeof head.revision === 'number') ? (head.revision + 1) : 1;
                    var now = Date.now();

                    var slotMeta = {
                        revision: nextRevision,
                        timestamp: now,
                        byteLength: arr.length,
                        checksum: check,
                        path: path,
                        source: source,
                    };

                    // Two-phase commit: write slot payload+meta first, then flip head pointer.
                    localStorage.setItem(slotDataKey(nextSlot), payload);
                    localStorage.setItem(slotMetaKey(nextSlot), JSON.stringify(slotMeta));
                    localStorage.setItem(headKey(), JSON.stringify({
                        activeSlot: nextSlot,
                        revision: nextRevision,
                        timestamp: now,
                    }));

                    // Keep legacy keys for backward compatibility and rollback safety.
                    localStorage.setItem(legacyDataKey(), payload);
                    localStorage.setItem(legacyPathKey(), path);
                    return true;
                } catch(e) { return false; }
            }

            function performSaveToLocalStorage(sourceTag) {
                return new Promise(function (resolve) {
                    if (!gm || !gm.FS) { resolve(false); return; }

                    var source = sourceTag || 'fs-sync';

                    function readFS() {
                        var ok = false;
                        var canonical = canonicalSavePath();
                        var legacyPath = sanitizeSavePath(localStorage.getItem(legacyPathKey()) || canonical);
                        var candidates = [canonical, '/data/saves/' + EJS_gameName + '.sav'];
                        if (legacyPath !== canonical) candidates.push(legacyPath);

                        for (var c = 0; c < candidates.length; c++) {
                            try {
                                var d0 = gm.FS.readFile(candidates[c]);
                                if (d0 && d0.length >= 64) {
                                    ok = storeSaveBytes(candidates[c], d0, { source: source });
                                    if (ok) break;
                                }
                            } catch (e) {}
                        }

                        if (ok) {
                            resolve(true);
                            return;
                        }

                        // Restricted fallback: same ROM name only, then choose largest valid match.
                        try {
                            var files = gm.FS.readdir('/data/saves/');
                            var best = null;
                            var bestSize = 0;
                            var target = normalizeName(EJS_gameName);
                            for (var i = 0; i < files.length; i++) {
                                var f = files[i];
                                if (f === '.' || f === '..' || f === 'Auto.cache') continue;
                                if (normalizeName(f).indexOf(target) === -1) continue;
                                try {
                                    var fd = gm.FS.readFile('/data/saves/' + f);
                                    if (fd && fd.length >= 64 && fd.length > bestSize) {
                                        best = { path: '/data/saves/' + f, data: fd };
                                        bestSize = fd.length;
                                    }
                                } catch(e) {}
                            }
                            if (best) ok = storeSaveBytes(best.path, best.data, { source: source });
                        } catch(e) {}

                        resolve(ok);
                    }

                    try {
                        var p = gm.saveSaveFiles();
                        if (p && typeof p.then === 'function') {
                            // Extra flush headroom to avoid reading stale pre-overwrite bytes.
                            p.then(function () { setTimeout(readFS, 1200); })
                             .catch(function () { setTimeout(readFS, 2200); });
                        } else {
                            setTimeout(readFS, 2200);
                        }
                    } catch(e) {
                        setTimeout(readFS, 2200);
                    }
                });
            }

            function saveToLocalStorage(callback, sourceTag) {
                var source = sourceTag || 'fs-sync';
                saveQueue = saveQueue
                    .then(function () { return performSaveToLocalStorage(source); })
                    .catch(function () { return false; });
                if (callback) {
                    saveQueue.then(function (ok) { callback(!!ok); });
                }
            }

            var scrollTimer = null,
                scrollDir = null;
            window.addEventListener("scrollDown", function () {
                clearTimeout(scrollTimer);
                if (scrollDir !== 7) {
                    if (scrollDir !== null)
                        release(scrollDir, scrollDir === 7 ? 39 : 37);
                    scrollDir = 7;
                    press(7, 39);
                }
                scrollTimer = setTimeout(function () {
                    if (scrollDir === 7) {
                        release(7, 39);
                        scrollDir = null;
                    }
                }, 200);
            });
            window.addEventListener("scrollUp", function () {
                clearTimeout(scrollTimer);
                if (scrollDir !== 6) {
                    if (scrollDir !== null)
                        release(scrollDir, scrollDir === 7 ? 39 : 37);
                    scrollDir = 6;
                    press(6, 37);
                }
                scrollTimer = setTimeout(function () {
                    if (scrollDir === 6) {
                        release(6, 37);
                        scrollDir = null;
                    }
                }, 200);
            });

            function tryResumeCtx() {
                if (document.hidden) return;
                try {
                    var ejs = window.EJS_emulator;
                    var ac = ejs && (ejs.audioContext ||
                             (ejs.gameManager && ejs.gameManager.audioContext) ||
                             (ejs.Module && ejs.Module.SDL2 && ejs.Module.SDL2.audioContext));
                    if (ac && ac.state === 'suspended') ac.resume();
                } catch (e) {}
            }
            window.addEventListener('sideClick', tryResumeCtx);
            window.addEventListener('scrollUp', tryResumeCtx);
            window.addEventListener('scrollDown', tryResumeCtx);
            // Keep AudioContext alive during play — Android can suspend it mid-game
            setInterval(tryResumeCtx, 5000);
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) tryResumeCtx();
            });

            document.addEventListener(
                "contextmenu",
                function (e) {
                    var px = e.clientX,
                        py = e.clientY;
                    if (px > 60 || py > 60) e.preventDefault();
                },
                true,
            );

            // Set #gp z-index once after load
            var gp = document.getElementById("gp");
            if (gp) {
                gp.style.zIndex = "2147483647";
            }

            // Nuke settings popups and menu bar when EJS creates them
            var killSettings = new MutationObserver(function () {
                var els = document.querySelectorAll(
                    '.ejs_menu_bar, .ejs_settings_parent, .ejs_settings_btn, [class*="settings"]'
                );
                for (var i = 0; i < els.length; i++) {
                    els[i].style.setProperty('display', 'none', 'important');
                    els[i].style.setProperty('visibility', 'hidden', 'important');
                    els[i].style.setProperty('opacity', '0', 'important');
                    els[i].style.setProperty('pointer-events', 'none', 'important');
                }
            });
            killSettings.observe(document.body, { childList: true, subtree: true, attributes: true });
            setTimeout(function () { killSettings.disconnect(); }, 5000);
        </script>
