<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="Cache-Control" content="no-cache" />
        <meta
            name="viewport"
            content="width=240,initial-scale=1.0,user-scalable=no"
        />
        <meta
            http-equiv="Cache-Control"
            content="no-cache,no-store,must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>R1GBA</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 240px;
                height: 282px;
                overflow: hidden;
                background: #000;
                -webkit-user-select: none;
                user-select: none;
            }
            #game {
                position: absolute;
                width: 282px !important;
                height: 240px !important;
                left: -21px;
                top: 21px;
                transform: rotate(-90deg);
                transform-origin: center center;
                background: #000;
                overflow: hidden;
                will-change: transform;
            }
            #game canvas,
            .ejs_canvas {
                width: 100% !important;
                height: 100% !important;
                image-rendering: pixelated;
                will-change: transform;
            }
            .ejs_parent canvas {
                width: 100% !important;
                height: 100% !important;
            }
            #menu-trigger {
                position: fixed;
                left: 0;
                top: 0;
                width: 60px;
                height: 60px;
                z-index: 9999;
                touch-action: auto;
                pointer-events: auto;
                background: transparent;
            }
            [class*="virtual"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="gamepad"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="Gamepad"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="nipple"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            [class*="ejs_bottom"] {
                display: none !important;
            }
            .ejs_menu_bar, .ejs_settings_parent, .ejs_settings_btn {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            #gp {
                position: fixed;
                inset: 0;
                z-index: 2147483647;
                pointer-events: none;
                will-change: transform;
                isolation: isolate;
            }
            .gp-btn {
                position: absolute;
                display: flex;
                align-items: center;
                justify-content: center;
                color: rgba(255, 255, 255, 0.5);
                font-size: 11px;
                font-weight: 700;
                pointer-events: auto;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                -webkit-user-drag: none;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                transform: rotate(-90deg);
                background: transparent;
                transition: none;
                user-select: none;
                -webkit-user-select: none;
            }
            .gp-btn:active {
                opacity: 0.6;
                background: none;
            }
            #gp-up {
                top: 230px;
                right: 54px;
                width: 36px;
                height: 36px;
                line-height: 1;
                padding: 0;
            }
            #gp-down {
                top: 246px;
                right: 14px;
                width: 36px;
                height: 36px;
            }
            #gp-left {
                display: none !important;
            }
            #gp-right {
                display: none !important;
            }
            #gp-a {
                top: 18px;
                right: 54px;
                width: 36px;
                height: 36px;
            }
            #gp-b {
                top: 6px;
                right: 14px;
                width: 36px;
                height: 36px;
            }
            #gp-r {
                top: 6px;
                right: 202px;
                width: 28px;
                height: 28px;
                background: rgba(0,0,0,0.4);
                border: 1px solid rgba(255,255,255,0.25);
            }
            #gp-l {
                top: 246px;
                right: 202px;
                width: 28px;
                height: 28px;
                background: rgba(0,0,0,0.4);
                border: 1px solid rgba(255,255,255,0.25);
            }

            #save-status {
                position: absolute;
                left: 50%;
                bottom: 8px;
                transform: translateX(-50%);
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 2px 6px;
                border-radius: 10px;
                background: rgba(0, 0, 0, 0.18);
                color: rgba(255, 255, 255, 0.42);
                font-size: 8px;
                letter-spacing: 0.2px;
                opacity: 0;
                transition: opacity 0.18s ease;
                pointer-events: none;
                z-index: 2147483647;
            }
            #save-status.show {
                opacity: 1;
            }
            #save-status .save-spinner {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-top-color: rgba(255, 255, 255, 0.75);
                animation: save-spin 0.8s linear infinite;
                flex-shrink: 0;
            }
            #save-status.idle .save-spinner {
                animation: none;
                border-top-color: rgba(255, 255, 255, 0.3);
            }
            @keyframes save-spin {
                to {
                    transform: rotate(360deg);
                }
            }

            #save-overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.35);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.16s ease;
                z-index: 2147483648;
            }
            #save-overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
            #save-overlay-card {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 10px;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.65);
                color: rgba(255, 255, 255, 0.9);
                font-size: 10px;
                letter-spacing: 0.2px;
            }
            #save-overlay-spinner {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-top-color: rgba(255, 255, 255, 0.95);
                animation: save-spin 0.8s linear infinite;
                flex-shrink: 0;
            }

        </style>
    </head>
    <body>
        <div id="game"></div>
        <div id="menu-trigger"></div>
        <div id="gp">
            <div id="gp-up" class="gp-btn" data-btn="4" data-kc="38">▲</div>
            <div id="gp-down" class="gp-btn" data-btn="5" data-kc="40">▼</div>
            <div id="gp-left" class="gp-btn" data-btn="6" data-kc="37">◀</div>
            <div id="gp-right" class="gp-btn" data-btn="7" data-kc="39">▶</div>
            <div id="gp-a" class="gp-btn" data-btn="8" data-kc="90">A</div>
            <div id="gp-b" class="gp-btn" data-btn="0" data-kc="88">B</div>
            <div id="gp-l" class="gp-btn" data-btn="10" data-kc="81">L</div>
            <div id="gp-r" class="gp-btn" data-btn="11" data-kc="87">R</div>
            <div id="save-status" class="idle" role="status" aria-live="polite">
                <span class="save-spinner" aria-hidden="true"></span>
                <span id="save-status-text">Saved</span>
            </div>
        </div>
        <div id="save-overlay" aria-hidden="true">
            <div id="save-overlay-card" role="status" aria-live="polite">
                <span id="save-overlay-spinner" aria-hidden="true"></span>
                <span id="save-overlay-text">Syncing save...</span>
            </div>
        </div>

        <script>
            // Hard-disable web vibrate calls (from any source, including hidden controls).
            try {
                if (navigator && typeof navigator.vibrate === 'function') {
                    navigator.vibrate = function () { return false; };
                }
            } catch (e) {}

            var romUrl = "";
            var m = location.search.match(/[?&]rom=([^&]+)/);
            if (m) {
                romUrl = decodeURIComponent(m[1]);
                if (
                    !romUrl.match(/^https?:\/\//) &&
                    romUrl.match(/^[a-zA-Z0-9_-]+$/)
                ) {
                    romUrl =
                        "https://drive.usercontent.google.com/download?id=" +
                        romUrl +
                        "&export=download";
                }
            }

            EJS_player = "#game";
            EJS_core = "gba";
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            EJS_gameUrl = romUrl;
            EJS_gameName = romUrl.replace(/^.*[\/\\]/,'').replace(/\.gba$/i,'');
            EJS_startOnLoaded = true;
            EJS_hideSettings = true;
            EJS_volume = 0.5;
            EJS_backgroundColor = "#000";
            EJS_VirtualGamepadSettings = [];
            EJS_Buttons = {
                playPause: false,
                restart: false,
                mute: false,
                settings: false,
                fullscreen: false,
                saveState: false,
                loadState: false,
                screenRecord: false,
                gamepad: false,
                cheat: false,
                volume: false,
                saveSavFiles: false,
                loadSavFiles: false,
                quickSave: false,
                quickLoad: false,
                screenshot: false,
                cacheManager: false,
                exitEmulation: false,
            };
            EJS_defaultOptions = {
                mgba_frameskip: 2,
                mgba_frameskip_threshold: "33",
                'vsync': 'disabled',
            };
            EJS_retroarchOpts = [
                { name: "audio_latency",      default: "256",  isString: false },
                { name: "audio_rate_control", default: "true", isString: false },
                { name: "audio_rate_control_delta", default: "0.0015", isString: false },
                { name: "audio_resampler",    default: "sinc", isString: true  },
                { name: "video_threaded",     default: "true"                   },
                { name: "video_vsync",        default: "false", isString: false },
            ];

            var gm = null,
                started = false,
                autoSaveIntervalId = null,
                saveQueue = Promise.resolve(),
                saveStatusEl = null,
                saveStatusTextEl = null,
                saveOverlayEl = null,
                saveOverlayTextEl = null,
                saveStatusHideTimer = null,
                dirtyPollTimer = null,
                dirtyBurstTimers = [],
                dirtyLastFingerprint = null,
                dirtySyncGeneration = 0,
                dirtySyncStartAt = 0,
                dirtySyncSettled = true,
                closeSaveLastAt = 0,
                lastSaveRequestAt = 0;

            function hashBytes(bytes) {
                var h = 2166136261 >>> 0;
                for (var i = 0; i < bytes.length; i++) {
                    h ^= bytes[i];
                    h = Math.imul(h, 16777619) >>> 0;
                }
                return h >>> 0;
            }

            function ensureSaveStatus() {
                if (!saveStatusEl) saveStatusEl = document.getElementById('save-status');
                if (!saveStatusTextEl) saveStatusTextEl = document.getElementById('save-status-text');
                if (!saveOverlayEl) saveOverlayEl = document.getElementById('save-overlay');
                if (!saveOverlayTextEl) saveOverlayTextEl = document.getElementById('save-overlay-text');
            }

            function setSaveOverlay(show, text) {
                ensureSaveStatus();
                if (!saveOverlayEl || !saveOverlayTextEl) return;
                if (text) saveOverlayTextEl.textContent = text;
                if (show) {
                    saveOverlayEl.classList.add('show');
                    saveOverlayEl.setAttribute('aria-hidden', 'false');
                } else {
                    saveOverlayEl.classList.remove('show');
                    saveOverlayEl.setAttribute('aria-hidden', 'true');
                }
            }

            function setSaveStatus(text, isSaving, holdMs) {
                ensureSaveStatus();
                if (!saveStatusEl || !saveStatusTextEl) return;
                saveStatusTextEl.textContent = text;
                saveStatusEl.classList.add('show');
                if (isSaving) {
                    saveStatusEl.classList.remove('idle');
                } else {
                    saveStatusEl.classList.add('idle');
                }
                clearTimeout(saveStatusHideTimer);
                if (!isSaving) {
                    saveStatusHideTimer = setTimeout(function () {
                        if (saveStatusEl) saveStatusEl.classList.remove('show');
                    }, holdMs || 1800);
                }
            }

            function getSaveRamFingerprint() {
                if (!gm) return null;
                try {
                    var M = gm.Module || (window.EJS_emulator && window.EJS_emulator.Module);
                    if (!M || !M.HEAPU8 || !M._retro_get_memory_data || !M._retro_get_memory_size) return null;
                    var ptr = M._retro_get_memory_data(2); // RETRO_MEMORY_SAVE_RAM
                    var size = M._retro_get_memory_size(2);
                    if (!(ptr > 0 && size >= 64)) return null;
                    var h = 2166136261 >>> 0;
                    for (var i = 0; i < size; i++) {
                        h ^= M.HEAPU8[ptr + i];
                        h = Math.imul(h, 16777619) >>> 0;
                    }
                    h ^= size;
                    h = Math.imul(h, 16777619) >>> 0;
                    return h.toString(16) + ':' + size;
                } catch (e) {
                    return null;
                }
            }

            function getFsSaveFingerprint() {
                if (!gm || !gm.FS) return null;
                try {
                    var savePath = localStorage.getItem('_r1s_' + EJS_gameName + '_path') ||
                                   ('/data/saves/' + EJS_gameName + '.srm');
                    var candidates = [savePath, '/data/saves/' + EJS_gameName + '.srm', '/data/saves/' + EJS_gameName + '.sav'];
                    for (var i = 0; i < candidates.length; i++) {
                        try {
                            var d = gm.FS.readFile(candidates[i]);
                            if (!d || d.length < 64) continue;
                            var arr = new Uint8Array(d);
                            return 'fs:' + hashBytes(arr).toString(16) + ':' + arr.length;
                        } catch (e) {}
                    }
                } catch (e2) {}
                return null;
            }

            function clearDirtyBurstTimers() {
                for (var i = 0; i < dirtyBurstTimers.length; i++) {
                    clearTimeout(dirtyBurstTimers[i]);
                }
                dirtyBurstTimers = [];
            }

            function finishDirtySync(gen, ok) {
                if (gen !== dirtySyncGeneration || dirtySyncSettled) return;
                dirtySyncSettled = true;
                clearDirtyBurstTimers();
                setSaveOverlay(false);
                if (ok) {
                    setSaveStatus('Safe to Exit', false, 2400);
                } else {
                    setSaveStatus('Save pending', false, 2400);
                }
            }

            function startDirtySyncBurst() {
                dirtySyncGeneration++;
                var gen = dirtySyncGeneration;
                dirtySyncSettled = false;
                dirtySyncStartAt = Date.now();
                clearDirtyBurstTimers();
                setSaveOverlay(true, 'Syncing save...');
                setSaveStatus('Saving...', true);

                var schedule = [0, 1200, 2800, 5200, 8200, 12000];
                for (var i = 0; i < schedule.length; i++) {
                    (function (idx) {
                        dirtyBurstTimers.push(setTimeout(function () {
                            queueSave('dirty-burst', function (ok) {
                                if (gen !== dirtySyncGeneration || dirtySyncSettled) return;
                                var elapsed = Date.now() - dirtySyncStartAt;
                                if (ok && elapsed >= 3200) {
                                    finishDirtySync(gen, true);
                                    return;
                                }
                                if (idx === schedule.length - 1) {
                                    finishDirtySync(gen, !!ok);
                                }
                            });
                        }, schedule[idx]));
                    })(i);
                }
            }

            function startDirtyWatcher() {
                if (dirtyPollTimer) clearInterval(dirtyPollTimer);
                dirtyLastFingerprint = getSaveRamFingerprint() || getFsSaveFingerprint();
                dirtyPollTimer = setInterval(function () {
                    if (!started || !gm) return;
                    var next = getSaveRamFingerprint() || getFsSaveFingerprint();
                    if (!next) return;
                    if (!dirtyLastFingerprint) {
                        dirtyLastFingerprint = next;
                        return;
                    }
                    if (next !== dirtyLastFingerprint) {
                        dirtyLastFingerprint = next;
                        startDirtySyncBurst();
                    }
                }, 500);
            }

            function queueSave(reason, callback) {
                reason = reason || 'autosave';
                var now = Date.now();
                if (reason === 'dirty-burst' && now - lastSaveRequestAt < 900) {
                    if (callback) callback(false);
                    return;
                }
                lastSaveRequestAt = now;
                saveToLocalStorage(callback, reason);
            }

            function bestEffortCloseSave() {
                var now = Date.now();
                if (now - closeSaveLastAt < 1000) return;
                closeSaveLastAt = now;
                queueSave('close-event');
            }

            function restoreFromLocalStorage(fsOverride) {
                try {
                    var saved = localStorage.getItem('_r1s_' + EJS_gameName);
                    if (!saved) return false;
                    var bytes;
                    try {
                        var bin = atob(saved);
                        bytes = new Uint8Array(bin.length);
                        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    } catch(e) {
                        try {
                            var plain = JSON.parse(saved);
                            bytes = new Uint8Array(plain.length);
                            for (var j = 0; j < plain.length; j++) bytes[j] = plain[j];
                        } catch(e2) { return false; }
                    }
                    if (!bytes || !bytes.length) return false;

                    var fs = fsOverride || (gm && gm.FS);
                    if (!fs) return false;

                    // Method 1: write directly into WASM SRAM memory — bypasses all FS/IndexedDB races
                    var sramDone = false;
                    if (!fsOverride && gm) {
                        try {
                            var M = gm.Module || (window.EJS_emulator && window.EJS_emulator.Module);
                            if (M && M.HEAPU8 && M._retro_get_memory_data && M._retro_get_memory_size) {
                                var ptr  = M._retro_get_memory_data(2); // RETRO_MEMORY_SAVE_RAM
                                var size = M._retro_get_memory_size(2);
                                if (ptr > 0 && size > 0) {
                                    var len = Math.min(bytes.length, size);
                                    for (var k = 0; k < len; k++) M.HEAPU8[ptr + k] = bytes[k];
                                    sramDone = true;
                                }
                            }
                        } catch(e) {}
                    }

                    // Method 2: write to FS — always do this so saveSaveFiles() flushes correct data
                    var savePath = localStorage.getItem('_r1s_' + EJS_gameName + '_path') ||
                                   ('/data/saves/' + EJS_gameName + '.srm');
                    try { fs.mkdir('/data'); } catch(e) {}
                    try { fs.mkdir('/data/saves'); } catch(e) {}
                    try { fs.writeFile(savePath, bytes); } catch(e) {}

                    if (fsOverride) return true;

                    // Only call loadSaveFiles if direct SRAM write failed
                    // (loadSaveFiles does IndexedDB sync that can race with startSaveInterval)
                    if (!sramDone) {
                        setTimeout(function () {
                            try { gm.loadSaveFiles(); } catch(e) {}
                        }, 300);
                    }
                    return true;
                } catch(e) { return false; }
            }

            function layoutGameContainer() {
                var game = document.getElementById('game');
                if (!game) return;
                var vw = window.innerWidth || 240;
                var vh = window.innerHeight || 282;
                var w = vh;
                var h = vw;
                game.style.setProperty('width', w + 'px', 'important');
                game.style.setProperty('height', h + 'px', 'important');
                game.style.left = ((vw - w) / 2) + 'px';
                game.style.top = ((vh - h) / 2) + 'px';
            }

            function applyGameCanvasFit() {
                var cvs = document.querySelector('#game canvas');
                if (!cvs) return false;
                cvs.style.width = '100%';
                cvs.style.height = '100%';
                cvs.style.minWidth = '100%';
                cvs.style.minHeight = '100%';
                // "fill" = full screen with no crop; this may stretch slightly.
                cvs.style.objectFit = 'fill';
                var p = cvs.parentElement;
                while (p && p.id !== 'game') {
                    p.style.width = '100%';
                    p.style.height = '100%';
                    p.style.minWidth = '100%';
                    p.style.minHeight = '100%';
                    p.style.margin = '0';
                    p.style.padding = '0';
                    p.style.border = 'none';
                    p.style.overflow = 'hidden';
                    p = p.parentElement;
                }
                return true;
            }

            layoutGameContainer();
            window.addEventListener('resize', function () {
                layoutGameContainer();
                applyGameCanvasFit();
            });

            EJS_ready = function () {
                var tryReady = setInterval(function () {
                    if (window.EJS_emulator) {
                        clearInterval(tryReady);
                        try { window.EJS_emulator.startSaveInterval(10000); } catch(e) {}
                        try {
                            window.EJS_emulator.on('saveDatabaseLoaded', function (FS) {
                                // Pre-boot restore so games detect save on first open.
                                restoreFromLocalStorage(FS);
                            });
                        } catch (e) {}
                    }
                }, 200);
            };

            EJS_onGameStart = function () {
                var tryGet = setInterval(function () {
                    if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                        clearInterval(tryGet);
                        gm = window.EJS_emulator.gameManager;
                        started = true;
                        // Restore save from localStorage
                        setTimeout(restoreFromLocalStorage, 800);
                        // Frequent autosave keeps close-to-exit windows small.
                        if (autoSaveIntervalId) clearInterval(autoSaveIntervalId);
                        autoSaveIntervalId = setInterval(function () {
                            queueSave('autosave-interval');
                        }, 8000);
                        setTimeout(function () {
                            dirtyLastFingerprint = getSaveRamFingerprint() || getFsSaveFingerprint() || dirtyLastFingerprint;
                        }, 1300);
                        setTimeout(startDirtyWatcher, 2500);
                    }
                }, 300);

                // Fit reliably even when emulator canvas appears late or gets recreated.
                var fitAttempts = 0;
                var fitTicker = setInterval(function () {
                    fitAttempts++;
                    layoutGameContainer();
                    if (applyGameCanvasFit() || fitAttempts > 120) {
                        clearInterval(fitTicker);
                    }
                }, 125);

                var gameEl = document.getElementById('game');
                if (gameEl) {
                    var fitObserver = new MutationObserver(function () {
                        layoutGameContainer();
                        applyGameCanvasFit();
                    });
                    fitObserver.observe(gameEl, { childList: true, subtree: true });
                    setTimeout(function () {
                        try { fitObserver.disconnect(); } catch (e) {}
                    }, 15000);
                }
            };

            function doInput(btn, keyCode, val) {
                if (gm) {
                    try {
                        gm.simulateInput(0, btn, val);
                        return;
                    } catch (e) {}
                }
                var el = document.querySelector("#game");
                if (!el) return;
                var keyName =
                    {
                        90: "z",
                        88: "x",
                        87: "w",
                        81: "q",
                        13: "Enter",
                        16: "Shift",
                        37: "ArrowLeft",
                        38: "ArrowUp",
                        39: "ArrowRight",
                        40: "ArrowDown",
                    }[keyCode] || "unknown";
                var evtType = val === 1 ? "keydown" : "keyup";
                el.dispatchEvent(
                    new KeyboardEvent(evtType, {
                        key: keyName,
                        code: keyCode === 16 ? "ShiftLeft" : keyName,
                        keyCode: keyCode,
                        which: keyCode,
                        bubbles: true,
                        cancelable: true,
                    }),
                );
            }

            function press(btn, kc) {
                doInput(btn, kc, 1);
            }
            function release(btn, kc) {
                doInput(btn, kc, 0);
            }
            function tap(btn, kc, ms) {
                press(btn, kc);
                setTimeout(function () {
                    release(btn, kc);
                }, ms || 80);
            }

            document.querySelectorAll(".gp-btn").forEach(function (el) {
                var btn = parseInt(el.dataset.btn);
                var kc = parseInt(el.dataset.kc);
                el.addEventListener("pointerdown", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    press(btn, kc);
                });
                el.addEventListener("pointerup", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    release(btn, kc);
                });
                el.addEventListener("pointerleave", function () {
                    release(btn, kc);
                });
                el.addEventListener("pointercancel", function () {
                    release(btn, kc);
                });
                el.addEventListener("click", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("touchstart", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }, { passive: false });
                el.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }, { passive: false });
                el.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("mouseup", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
                el.addEventListener("contextmenu", function (e) {
                    e.preventDefault();
                });
            });

            var sideCount = 0,
                lastSide = 0,
                sideTimer = null,
                longHeld = false;
            var SUPER_LONG_MS = 4000,
                superLongTimer = null;

            window.addEventListener("sideClick", function () {
                if (longHeld) return;
                var now = Date.now();
                clearTimeout(sideTimer);
                if (now - lastSide < 250) {
                    release(8, 90);
                    tap(0, 88, 80);
                    sideCount = 0;
                } else {
                    press(8, 90);
                    sideCount = 1;
                    sideTimer = setTimeout(function () {
                        if (sideCount === 1) {
                            release(8, 90);
                            sideCount = 0;
                        }
                    }, 200);
                }
                lastSide = now;
            });

            window.addEventListener("longPressStart", function () {
                longHeld = true;
                press(3, 13);
                superLongTimer = setTimeout(function () {
                    if (longHeld) {
                        release(3, 13);
                        saveToLocalStorage(function () {
                            window.location.href = "index.html";
                        }, 'manual-exit');
                    }
                }, SUPER_LONG_MS);
            });
            window.addEventListener("longPressEnd", function () {
                longHeld = false;
                clearTimeout(superLongTimer);
                release(3, 13);
            });

            window.addEventListener('pagehide', bestEffortCloseSave, true);
            window.addEventListener('beforeunload', bestEffortCloseSave, true);
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden') {
                    bestEffortCloseSave();
                }
            });

            function storeSaveBytes(fullPath, data) {
                if (!data || !data.length) return false;
                try {
                    var arr = new Uint8Array(data);
                    var bin = '';
                    for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
                    localStorage.setItem('_r1s_' + EJS_gameName, btoa(bin));
                    localStorage.setItem('_r1s_' + EJS_gameName + '_path', fullPath);
                    return true;
                } catch(e) { return false; }
            }

            function performSaveToLocalStorage(done) {
                if (!gm || !gm.FS) { done(false); return; }

                function commitPathIfStable(path, data, cb) {
                    try {
                        var first = new Uint8Array(data);
                        var firstHash = hashBytes(first);
                        setTimeout(function () {
                            try {
                                var secondRaw = gm.FS.readFile(path);
                                if (!secondRaw || secondRaw.length !== first.length) { cb(false); return; }
                                var second = new Uint8Array(secondRaw);
                                if (hashBytes(second) !== firstHash) { cb(false); return; }
                                cb(storeSaveBytes(path, second));
                            } catch (e) {
                                cb(false);
                            }
                        }, 220);
                    } catch (e) {
                        cb(false);
                    }
                }

                function tryCandidates(candidates, idx, cb) {
                    if (idx >= candidates.length) { cb(false); return; }
                    var path = candidates[idx];
                    try {
                        var d0 = gm.FS.readFile(path);
                        if (d0 && d0.length >= 64) {
                            commitPathIfStable(path, d0, function (ok) {
                                if (ok) cb(true);
                                else tryCandidates(candidates, idx + 1, cb);
                            });
                            return;
                        }
                    } catch (e) {}
                    tryCandidates(candidates, idx + 1, cb);
                }

                function readFS() {
                    // Try expected path(s) first so overwrites stay on the same file.
                    try {
                        var savePath = localStorage.getItem('_r1s_' + EJS_gameName + '_path') ||
                                       ('/data/saves/' + EJS_gameName + '.srm');
                        var candidates = [
                            savePath,
                            '/data/saves/' + EJS_gameName + '.srm',
                            '/data/saves/' + EJS_gameName + '.sav'
                        ];
                        tryCandidates(candidates, 0, function (okPrimary) {
                            if (okPrimary) { done(true); return; }

                            // Read largest valid save file in /data/saves/ (not just first)
                            try {
                                var files = gm.FS.readdir('/data/saves/');
                                var best = null, bestSize = 0;
                                for (var i = 0; i < files.length; i++) {
                                    var f = files[i];
                                    if (f === '.' || f === '..' || f === 'Auto.cache') continue;
                                    try {
                                        var fd = gm.FS.readFile('/data/saves/' + f);
                                        if (fd && fd.length > bestSize && fd.length >= 64) {
                                            best = { path: '/data/saves/' + f, data: fd };
                                            bestSize = fd.length;
                                        }
                                    } catch(e) {}
                                }
                                if (!best) {
                                    done(false);
                                    return;
                                }
                                commitPathIfStable(best.path, best.data, function (okBest) {
                                    done(!!okBest);
                                });
                            } catch(e) {
                                done(false);
                            }
                        });
                    } catch (e) {
                        done(false);
                    }
                }

                try {
                    var p = gm.saveSaveFiles();
                    if (p && typeof p.then === 'function') {
                        // saveSaveFiles returned a Promise — wait extra for overwrite flush on R1
                        p.then(function () { setTimeout(readFS, 1200); })
                         .catch(function () { setTimeout(readFS, 2400); });
                    } else {
                        // No Promise — conservative delay for R1 WASM flush
                        setTimeout(readFS, 2400);
                    }
                } catch(e) {
                    setTimeout(readFS, 2400);
                }
            }

            function saveToLocalStorage(callback, reason) {
                reason = reason || 'autosave';
                var suppressProgress = (reason === 'autosave-interval' || reason === 'close-event');
                var suppressFinal = (reason === 'dirty-burst' || suppressProgress);
                if (!suppressProgress) {
                    setSaveStatus('Saving...', true);
                }
                saveQueue = saveQueue
                    .then(function () {
                        return new Promise(function (resolve) {
                            performSaveToLocalStorage(function (ok) {
                                resolve(!!ok);
                            });
                        });
                    })
                    .catch(function () {
                        return false;
                    });

                saveQueue.then(function (ok) {
                    if (!suppressFinal) {
                        if (ok) {
                            setSaveStatus('Safe to Exit', false, 1800);
                        } else {
                            setSaveStatus('Save pending', false, 2000);
                        }
                    }
                    if (callback) callback(!!ok);
                });
            }

            var scrollTimer = null,
                scrollDir = null;
            window.addEventListener("scrollDown", function () {
                clearTimeout(scrollTimer);
                if (scrollDir !== 7) {
                    if (scrollDir !== null)
                        release(scrollDir, scrollDir === 7 ? 39 : 37);
                    scrollDir = 7;
                    press(7, 39);
                }
                scrollTimer = setTimeout(function () {
                    if (scrollDir === 7) {
                        release(7, 39);
                        scrollDir = null;
                    }
                }, 200);
            });
            window.addEventListener("scrollUp", function () {
                clearTimeout(scrollTimer);
                if (scrollDir !== 6) {
                    if (scrollDir !== null)
                        release(scrollDir, scrollDir === 7 ? 39 : 37);
                    scrollDir = 6;
                    press(6, 37);
                }
                scrollTimer = setTimeout(function () {
                    if (scrollDir === 6) {
                        release(6, 37);
                        scrollDir = null;
                    }
                }, 200);
            });

            function tryResumeCtx() {
                if (document.hidden) return;
                try {
                    var ejs = window.EJS_emulator;
                    var ac = ejs && (ejs.audioContext ||
                             (ejs.gameManager && ejs.gameManager.audioContext) ||
                             (ejs.Module && ejs.Module.SDL2 && ejs.Module.SDL2.audioContext));
                    if (ac && ac.state === 'suspended') ac.resume();
                } catch (e) {}
            }
            window.addEventListener('sideClick', tryResumeCtx);
            window.addEventListener('scrollUp', tryResumeCtx);
            window.addEventListener('scrollDown', tryResumeCtx);
            // Keep AudioContext alive during play — Android can suspend it mid-game
            setInterval(tryResumeCtx, 5000);
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) tryResumeCtx();
            });

            document.addEventListener(
                "contextmenu",
                function (e) {
                    var px = e.clientX,
                        py = e.clientY;
                    if (px > 60 || py > 60) e.preventDefault();
                },
                true,
            );

            // Set #gp z-index once after load
            var gp = document.getElementById("gp");
            if (gp) {
                gp.style.zIndex = "2147483647";
            }

            // Nuke settings popups and menu bar when EJS creates them
            var killSettings = new MutationObserver(function () {
                var els = document.querySelectorAll(
                    '.ejs_menu_bar, .ejs_settings_parent, .ejs_settings_btn, [class*="settings"]'
                );
                for (var i = 0; i < els.length; i++) {
                    els[i].style.setProperty('display', 'none', 'important');
                    els[i].style.setProperty('visibility', 'hidden', 'important');
                    els[i].style.setProperty('opacity', '0', 'important');
                    els[i].style.setProperty('pointer-events', 'none', 'important');
                }
            });
            killSettings.observe(document.body, { childList: true, subtree: true, attributes: true });
            setTimeout(function () { killSettings.disconnect(); }, 5000);
        </script>
        <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
