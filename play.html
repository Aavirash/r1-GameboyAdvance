<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>R1GBA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:240px;height:282px;overflow:hidden;background:#000;-webkit-user-select:none;user-select:none}
#game{
  position:absolute;
  width:282px!important;height:240px!important;
  left:-21px;top:21px;
  transform:rotate(-90deg);
  transform-origin:center center;
  background:#000;
  overflow:hidden;
}
#game canvas{width:100%!important;height:100%!important}
/* Hide virtual gamepad */
#game .ejs_virtual_gamepad,
#game .ejs_virtualGamepad,
#game [class*="virtualGamepad"],
#game [class*="virtual_gamepad"],
#game [class*="VirtualGamepad"],
#game .ejs_gamepad,
#game .ejs_gamepad_parent,
#game .ejs_dpad,
#game .ejs_button,
#game .ejs_start_button,
.ejs_virtual_gamepad,
.ejs_virtualGamepad,
[class*="virtualGamepad"],
[class*="virtual_gamepad"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
var romUrl = '';
var m = location.search.match(/[?&]rom=([^&]+)/);
if (m) {
  romUrl = decodeURIComponent(m[1]);
  if (!romUrl.match(/^https?:\/\//) && romUrl.match(/^[a-zA-Z0-9_-]+$/)) {
    romUrl = 'https://drive.usercontent.google.com/download?id=' + romUrl + '&export=download';
  }
}

EJS_player = '#game';
EJS_core = 'gba';
EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
EJS_gameUrl = romUrl;
EJS_startOnLoaded = true;
EJS_volume = 0.5;
EJS_backgroundColor = '#000';

EJS_Buttons = {
  playPause: false, restart: false, mute: false, settings: false,
  fullscreen: false, saveState: false, loadState: false, screenRecord: false,
  gamepad: false, cheat: false, volume: false, saveSavFiles: false,
  loadSavFiles: false, quickSave: false, quickLoad: false, screenshot: false,
  cacheManager: false, exitEmulation: false
};

EJS_VirtualGamepadSettings = [];

// ─── Direct input via simulateInput ───
// Button indices: 0=B, 1=Y, 2=SELECT, 3=START, 4=UP, 5=DOWN, 6=LEFT, 7=RIGHT, 8=A, 9=X, 10=L, 11=R
var gm = null;

// EJS_onGameStart fires AFTER the game is running and gameManager exists
EJS_onGameStart = function() {
  try {
    gm = window.EJS_emulator.gameManager;
  } catch(e) {
    // Fallback: keep trying
    var tryGm = setInterval(function() {
      try {
        gm = window.EJS_emulator.gameManager;
        if (gm) clearInterval(tryGm);
      } catch(e2) {}
    }, 500);
  }
  // Hide virtual gamepad elements
  setInterval(function() {
    var all = document.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      var c = all[i].className;
      if (typeof c === 'string' && (c.indexOf('virtual') >= 0 || c.indexOf('gamepad') >= 0 || c.indexOf('Gamepad') >= 0 || c.indexOf('dpad') >= 0 || c.indexOf('Dpad') >= 0)) {
        all[i].style.display = 'none';
        all[i].style.visibility = 'hidden';
        all[i].style.pointerEvents = 'none';
      }
    }
  }, 200);
};

// Direct simulateInput: player=0, btn=index, value=1 press / 0 release
function press(btn) { if (gm) gm.simulateInput(0, btn, 1); }
function release(btn) { if (gm) gm.simulateInput(0, btn, 0); }
function tap(btn, ms) {
  press(btn);
  setTimeout(function(){ release(btn); }, ms || 80);
}

// ─── R1 Controls ───
var sideCount = 0, lastSide = 0, sideTimer = null, longHeld = false;
var SUPER_LONG_MS = 2000, superLongTimer = null;

// PTT: 1=A(8), 2=B(0)
window.addEventListener('sideClick', function(){
  if (longHeld) return;
  var now = Date.now();
  clearTimeout(sideTimer);
  sideCount = (now - lastSide < 350) ? sideCount + 1 : 1;
  lastSide = now;
  sideTimer = setTimeout(function(){
    if (sideCount === 1) tap(8, 80);      // A
    else if (sideCount === 2) tap(0, 80);  // B
    sideCount = 0;
  }, 350);
});

// Long press = Start(3). Super long (2s) = back to menu
window.addEventListener('longPressStart', function(){
  longHeld = true;
  press(3); // START
  superLongTimer = setTimeout(function(){
    if (longHeld) {
      release(3);
      window.location.href = 'index.html';
    }
  }, SUPER_LONG_MS);
});
window.addEventListener('longPressEnd', function(){
  longHeld = false;
  clearTimeout(superLongTimer);
  release(3); // START release
});

// ─── Scroll = D-pad ───
window.addEventListener('scrollDown', function(){ tap(7, 120); }); // RIGHT
window.addEventListener('scrollUp',   function(){ tap(6, 120); }); // LEFT

// ─── Touch D-Pad ───
var touchDirs = {}, touchActive = false;
document.addEventListener('pointerdown', function(e){ touchActive = true; updateTouch(e); }, true);
document.addEventListener('pointermove', function(e){ if(touchActive) updateTouch(e); }, true);
document.addEventListener('pointerup',   function(){ touchActive = false; releaseTouch(); }, true);
document.addEventListener('pointercancel',function(){ touchActive = false; releaseTouch(); }, true);

// Rotated -90deg: screen coords → game buttons
// left of screen (px<80) = UP(4), right (px>160) = DOWN(5), top (py<80) = RIGHT(7), bottom (py>200) = LEFT(6)
function updateTouch(e) {
  var px = Math.max(0, Math.min(240, e.clientX));
  var py = Math.max(0, Math.min(282, e.clientY));
  var nd = {};
  if (px < 80)  nd[4] = true;  // UP
  if (px > 160) nd[5] = true;  // DOWN
  if (py < 80)  nd[7] = true;  // RIGHT
  if (py > 200) nd[6] = true;  // LEFT
  for (var k in nd)       { if (!touchDirs[k]) press(parseInt(k)); }
  for (var k in touchDirs) { if (!nd[k])       release(parseInt(k)); }
  touchDirs = nd;
}
function releaseTouch() {
  for (var k in touchDirs) release(parseInt(k));
  touchDirs = {};
}

// Audio resume on gesture
function tryResume() {
  try { if (window.AudioContext && window.AudioContext.prototype.resume) window.AudioContext.prototype.resume(); } catch(e) {}
}
window.addEventListener('sideClick', tryResume);
window.addEventListener('scrollUp', tryResume);
window.addEventListener('scrollDown', tryResume);
document.addEventListener('pointerdown', tryResume, true);
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
