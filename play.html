<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>R1GBA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:240px;height:282px;overflow:hidden;background:#000;-webkit-user-select:none;user-select:none}
#game{
  position:absolute;
  width:282px!important;height:240px!important;
  left:-21px;top:21px;
  transform:rotate(-90deg);
  transform-origin:center center;
  background:#000;
  overflow:hidden;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
var romUrl = '';
var m = location.search.match(/[?&]rom=([^&]+)/);
if (m) {
  romUrl = decodeURIComponent(m[1]);
  if (!romUrl.match(/^https?:\/\//) && romUrl.match(/^[a-zA-Z0-9_-]+$/)) {
    romUrl = 'https://drive.usercontent.google.com/download?id=' + romUrl + '&export=download';
  }
}

// ─── EmulatorJS Config ───
EJS_player = '#game';
EJS_core = 'gba';
EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
EJS_gameUrl = romUrl;
EJS_startOnLoaded = true;
EJS_volume = 0.5;
EJS_backgroundColor = '#000';

// Hide toolbar buttons
EJS_Buttons = {
  playPause: false, restart: false, mute: false, settings: false,
  fullscreen: false, saveState: false, loadState: false, screenRecord: false,
  gamepad: false, cheat: false, volume: false, saveSavFiles: false,
  loadSavFiles: false, quickSave: false, quickLoad: false, screenshot: false,
  cacheManager: false, exitEmulation: false
};

// NO virtual gamepad buttons (hides the on-screen D-pad)
EJS_VirtualGamepadSettings = [];

// ─── After emulator loads ───
var ejsCanvas = null;
EJS_ready = function() {
  // Find the canvas for keyboard event dispatch
  ejsCanvas = document.querySelector('#game canvas');
  // Repeatedly hide virtual gamepad elements
  setInterval(function() {
    var els = document.querySelectorAll('.ejs_virtualGamePad_parent, .ejs_virtualGamePad, [class*="virtualGamePad"], [class*="ejs_gamepad"]');
    for (var i = 0; i < els.length; i++) els[i].style.display = 'none';
  }, 500);
};

// ─── Keyboard dispatch to EmulatorJS canvas ───
function kd(key, code) {
  var t = ejsCanvas || document.body;
  t.dispatchEvent(new KeyboardEvent('keydown', {key:key, code:code, keyCode:code==='Enter'?13:key.charCodeAt(0), which:code==='Enter'?13:key.charCodeAt(0), bubbles:true}));
}
function ku(key, code) {
  var t = ejsCanvas || document.body;
  t.dispatchEvent(new KeyboardEvent('keyup', {key:key, code:code, keyCode:code==='Enter'?13:key.charCodeAt(0), which:code==='Enter'?13:key.charCodeAt(0), bubbles:true}));
}
function tap(key, code, ms) {
  kd(key, code);
  setTimeout(function(){ ku(key, code); }, ms || 80);
}

// ─── R1 Controls ───
var sideCount = 0, lastSide = 0, sideTimer = null, longHeld = false;
var touchDirs = {}, touchActive = false;
var SUPER_LONG_MS = 2000, superLongTimer = null;

// PTT: 1=A(z), 2=B(x), 3+=Start(enter)
window.addEventListener('sideClick', function(){
  if (longHeld) return;
  var now = Date.now();
  clearTimeout(sideTimer);
  sideCount = (now - lastSide < 350) ? sideCount + 1 : 1;
  lastSide = now;
  sideTimer = setTimeout(function(){
    if (sideCount === 1)      tap('z', 'KeyZ', 60);
    else if (sideCount === 2) tap('x', 'KeyX', 60);
    else                      tap('Enter', 'Enter', 60);
    sideCount = 0;
  }, 350);
});

// Long press = Select(shift). Super long (2s) = back to menu
window.addEventListener('longPressStart', function(){
  longHeld = true;
  kd('Shift', 'ShiftLeft');
  superLongTimer = setTimeout(function(){
    if (longHeld) {
      ku('Shift', 'ShiftLeft');
      window.location.href = 'index.html';
    }
  }, SUPER_LONG_MS);
});
window.addEventListener('longPressEnd', function(){
  longHeld = false;
  clearTimeout(superLongTimer);
  ku('Shift', 'ShiftLeft');
});

// ─── Scroll ───
// R1 fires scrollUp when scrolling down, so we swap
window.addEventListener('scrollDown', function(){ tap('ArrowLeft', 'ArrowLeft', 120); });
window.addEventListener('scrollUp',   function(){ tap('ArrowRight', 'ArrowRight', 120); });

// ─── Touch D-Pad ───
// Rotated -90°: left=Up(forward), right=Down(back), top=Right, bottom=Left
document.addEventListener('pointerdown', function(e){ touchActive = true; updateTouch(e); }, true);
document.addEventListener('pointermove', function(e){ if(touchActive) updateTouch(e); }, true);
document.addEventListener('pointerup',   function(){ touchActive = false; releaseTouch(); }, true);
document.addEventListener('pointercancel',function(){ touchActive = false; releaseTouch(); }, true);

function updateTouch(e) {
  var px = Math.max(0, Math.min(240, e.clientX));
  var py = Math.max(0, Math.min(282, e.clientY));
  var nd = {};
  if (px < 80)  nd['ArrowUp'] = true;
  if (px > 160) nd['ArrowDown'] = true;
  if (py < 80)  nd['ArrowRight'] = true;
  if (py > 200) nd['ArrowLeft'] = true;
  for (var k in nd)       { if (!touchDirs[k]) kd(k, k); }
  for (var k in touchDirs) { if (!nd[k])       ku(k, k); }
  touchDirs = nd;
}
function releaseTouch() {
  for (var k in touchDirs) ku(k, k);
  touchDirs = {};
}

// Audio resume on gesture
function tryResume() {
  try { if (window.AudioContext && window.AudioContext.prototype.resume) window.AudioContext.prototype.resume(); } catch(e) {}
}
window.addEventListener('sideClick', tryResume);
window.addEventListener('scrollUp', tryResume);
window.addEventListener('scrollDown', tryResume);
document.addEventListener('pointerdown', tryResume, true);
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
