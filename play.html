<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>R1GBA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:240px;height:282px;
  overflow:hidden;
  background:#000;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:none;
}
#game{
  position:absolute;
  width:282px!important;height:240px!important;
  left:-21px;top:21px;
  transform:rotate(-90deg);
  transform-origin:center center;
  background:#000;
  overflow:hidden;
}
#game > *{
  position:absolute!important;
  top:0!important;left:0!important;
  width:100%!important;height:100%!important;
  border:none!important;
  margin:0!important;
  padding:0!important;
}
#game canvas,.ejs_canvas,.ejs_parent canvas{
  position:absolute!important;
  top:0!important;left:0!important;
  width:100%!important;height:100%!important;
  min-width:100%!important;min-height:100%!important;
  object-fit:cover!important;
  border:none!important;
  margin:0!important;
  padding:0!important;
}
/* Nuke ALL EmulatorJS chrome — only canvas survives */
[class*="virtual"],[class*="gamepad"],[class*="Gamepad"],
[class*="nipple"],[class*="ejs_"],[class*="EJS_"],
[class*="emscripten"],[id*="ejs"],[id*="EJS"],
.ejs_parent,.ejs_container,.ejs_shell,.ejs_overlay,
.ejs_bottom,.ejs_menu,.ejs_settings,.ejs_controls{
  display:none!important;
  visibility:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
  /* Prevent layout from these elements */
  position:fixed!important;
  top:-9999px!important;
  left:-9999px!important;
  width:0!important;
  height:0!important;
  overflow:hidden!important;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
var romUrl = '';
var m = location.search.match(/[?&]rom=([^&]+)/);
if (m) {
  romUrl = decodeURIComponent(m[1]);
  if (!romUrl.match(/^https?:\/\//) && romUrl.match(/^[a-zA-Z0-9_-]+$/)) {
    romUrl = 'https://drive.usercontent.google.com/download?id=' + romUrl + '&export=download';
  }
}

EJS_player = '#game';
EJS_core = 'gba';
EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
EJS_gameUrl = romUrl;
EJS_startOnLoaded = true;
EJS_volume = 0.08;
EJS_backgroundColor = '#000';
EJS_Buttons = {
  playPause:false, restart:false, mute:false, settings:false,
  fullscreen:false, saveState:false, loadState:false, screenRecord:false,
  gamepad:false, cheat:false, volume:false, saveSavFiles:false,
  loadSavFiles:false, quickSave:false, quickLoad:false, screenshot:false,
  cacheManager:false, exitEmulation:false
};
EJS_VirtualGamepadSettings = [];

var gm = null;
var started = false;

EJS_onGameStart = function() {
  var tryGet = setInterval(function() {
    try {
      if (window.EJS_emulator && window.EJS_emulator.gameManager) {
        gm = window.EJS_emulator.gameManager;
        started = true;
        clearInterval(tryGet);
      }
    } catch(e) {}
  }, 300);
  // Aggressively strip ALL EmulatorJS chrome — only keep canvas
  setInterval(function() {
    var game = document.getElementById('game');
    if (!game) return;
    // Walk all descendants and hide non-canvas elements
    var all = game.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      if (all[i].tagName !== 'CANVAS') {
        all[i].style.setProperty('display', 'none', 'important');
        all[i].style.setProperty('pointer-events', 'none', 'important');
      }
    }
    // Ensure canvas fills and is visible
    var cvs = game.querySelectorAll('canvas');
    for (var j = 0; j < cvs.length; j++) {
      cvs[j].style.setProperty('display', 'block', 'important');
      cvs[j].style.setProperty('position', 'absolute', 'important');
      cvs[j].style.setProperty('top', '0', 'important');
      cvs[j].style.setProperty('left', '0', 'important');
      cvs[j].style.setProperty('width', '100%', 'important');
      cvs[j].style.setProperty('height', '100%', 'important');
      cvs[j].style.setProperty('object-fit', 'cover', 'important');
      cvs[j].style.setProperty('pointer-events', 'auto', 'important');
    }
  }, 100);
};

// Button indices: 0=B, 2=SELECT, 3=START, 4=UP, 5=DOWN, 6=LEFT, 7=RIGHT, 8=A
// Visual landscape mapping (screen rotated -90deg):
//   physical left  → game LEFT  (btn 6)
//   physical right → game RIGHT (btn 7)
//   physical top   → game UP    (btn 4)
//   physical bottom→ game DOWN  (btn 5)
// keyMap keyCodes: z=90, x=88, Enter=13, ArrowLeft=37, ArrowUp=38, ArrowRight=39, ArrowDown=40

function doInput(btn, keyCode, val) {
  if (gm) {
    try { gm.simulateInput(0, btn, val); return; } catch(e) {}
  }
  var el = document.querySelector('#game');
  if (!el) return;
  var keyMap = {90:'z',88:'x',13:'Enter',16:'Shift',37:'ArrowLeft',38:'ArrowUp',39:'ArrowRight',40:'ArrowDown'};
  var keyName = keyMap[keyCode] || 'unknown';
  var evtType = val === 1 ? 'keydown' : 'keyup';
  el.dispatchEvent(new KeyboardEvent(evtType, {key:keyName, code:keyCode===16?'ShiftLeft':keyName, keyCode:keyCode, which:keyCode, bubbles:true, cancelable:true}));
}

function press(btn, kc) { doInput(btn, kc, 1); }
function release(btn, kc) { doInput(btn, kc, 0); }
function tap(btn, kc, ms) {
  press(btn, kc);
  setTimeout(function(){ release(btn, kc); }, ms || 80);
}

// ─── R1 Controls ───
var sideCount = 0, lastSide = 0, sideTimer = null, longHeld = false;
var SUPER_LONG_MS = 2000, superLongTimer = null;

// PTT: 1=A(btn8,kc90), 2=B(btn0,kc88)
window.addEventListener('sideClick', function(){
  if (longHeld) return;
  var now = Date.now();
  clearTimeout(sideTimer);
  sideCount = (now - lastSide < 350) ? sideCount + 1 : 1;
  lastSide = now;
  sideTimer = setTimeout(function(){
    if (sideCount === 1) tap(8, 90, 80);       // A
    else if (sideCount === 2) tap(0, 88, 80);   // B
    sideCount = 0;
  }, 350);
});

// Long press = Start(3,kc13). Super long (2s) = back to menu
window.addEventListener('longPressStart', function(){
  longHeld = true;
  press(3, 13);
  superLongTimer = setTimeout(function(){
    if (longHeld) { release(3, 13); window.location.href = 'index.html'; }
  }, SUPER_LONG_MS);
});
window.addEventListener('longPressEnd', function(){
  longHeld = false;
  clearTimeout(superLongTimer);
  release(3, 13);
});

// Scroll: hold direction while scrolling — release 200ms after last scroll
var scrollTimer = null, scrollDir = null;
window.addEventListener('scrollDown', function(){
  clearTimeout(scrollTimer);
  if (scrollDir !== 7) { if (scrollDir !== null) release(scrollDir, scrollDir===7?39:37); scrollDir=7; press(7, 39); }
  scrollTimer = setTimeout(function(){ if (scrollDir===7) { release(7,39); scrollDir=null; } }, 200);
});
window.addEventListener('scrollUp', function(){
  clearTimeout(scrollTimer);
  if (scrollDir !== 6) { if (scrollDir !== null) release(scrollDir, scrollDir===7?39:37); scrollDir=6; press(6, 37); }
  scrollTimer = setTimeout(function(){ if (scrollDir===6) { release(6,37); scrollDir=null; } }, 200);
});

// ─── Touch D-Pad (landscape orientation) ───
// Screen rotated -90deg: map touch zones to VISUAL directions
//   px < 80  (physical left)   → game LEFT  (btn 6, kc 37)
//   px > 160 (physical right)  → game RIGHT (btn 7, kc 39)
//   py < 80  (physical top)    → game UP    (btn 4, kc 38)
//   py > 200 (physical bottom) → game DOWN  (btn 5, kc 40)
var touchMap = {4:38, 5:40, 6:37, 7:39};
var touchDirs = {}, touchActive = false;
document.addEventListener('pointerdown', function(e){ touchActive = true; updateTouch(e); }, true);
document.addEventListener('pointermove', function(e){ if(touchActive) updateTouch(e); }, true);
document.addEventListener('pointerup',   function(){ touchActive = false; releaseTouch(); }, true);
document.addEventListener('pointercancel',function(){ touchActive = false; releaseTouch(); }, true);

function updateTouch(e) {
  var px = Math.max(0, Math.min(240, e.clientX));
  var py = Math.max(0, Math.min(282, e.clientY));
  var nd = {};
  if (px < 80)  nd[6] = true;  // LEFT
  if (px > 160) nd[7] = true;  // RIGHT
  if (py < 80)  nd[4] = true;  // UP
  if (py > 200) nd[5] = true;  // DOWN
  for (var k in nd)       { if (!touchDirs[k]) press(parseInt(k), touchMap[k]); }
  for (var k in touchDirs) { if (!nd[k])       release(parseInt(k), touchMap[k]); }
  touchDirs = nd;
}
function releaseTouch() {
  for (var k in touchDirs) release(parseInt(k), touchMap[k]);
  touchDirs = {};
}

// Prevent default browser gestures & navigation
document.addEventListener('contextmenu', function(e){ e.preventDefault(); }, true);
document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, true);
document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, true);
document.addEventListener('gestureend', function(e){ e.preventDefault(); }, true);

// Audio resume
function tryResume() {
  try { if (window.AudioContext && window.AudioContext.prototype.resume) window.AudioContext.prototype.resume(); } catch(e) {}
}
window.addEventListener('sideClick', tryResume);
window.addEventListener('scrollUp', tryResume);
window.addEventListener('scrollDown', tryResume);
document.addEventListener('pointerdown', tryResume, true);
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
