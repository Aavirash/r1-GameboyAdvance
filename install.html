<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>R1GBA — Install on Rabbit R1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,sans-serif;
  background:#0e0e10;color:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:20px;gap:24px;
}
h1{font-size:18px;font-weight:700;letter-spacing:2px;color:#FE5000}
p{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;max-width:280px}
#qrcode{padding:12px;background:#fff;border-radius:8px}
.note{font-size:10px;color:rgba(255,255,255,0.25);margin-top:16px}
</style>
</head>
<body>
<h1>R1GBA</h1>
<p>GBA Emulator for Rabbit R1<br>Powered by EmulatorJS (mGBA WASM core)</p>
<div id="qrcode"></div>
<p style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:-12px">
  Open R1 camera → scan QR → install
</p>
<p class="note">EmulatorJS mGBA core via WebAssembly<br>R1 side button + scroll wheel controls<br>ROMs from gba.js.org or Google Drive</p>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  var CREATION_URL = 'https://aavirash.github.io/r1-GameboyAdvance/?v=3';

  var qrData = JSON.stringify({
    title: "R1GBA",
    url: CREATION_URL,
    description: "GBA Emulator — mGBA WASM core. R1 controls, landscape.",
    iconUrl: "",
    themeColor: "#FE5000"
  });

  new QRCode(document.getElementById('qrcode'), {
    text: qrData,
    width: 180,
    height: 180,
    colorDark: '#0e0e10',
    colorLight: '#ffffff'
  });
</script>
</body>
</html>
